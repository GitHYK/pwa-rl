<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reading Lines</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reading Lines">
<meta name="theme-color" content="#07090e">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #07090e;
  --surface:   #0c1018;
  --border:    #181f2e;
  --border2:   #222d40;
  --en:        #ddd0b8;
  --en-cur:    #f5ead8;
  --ko:        #6a7d96;
  --ko-cur:    #8fa3bc;
  --ts:        #2e3f56;
  --ts-cur:    #4a6680;
  --accent:    #b8924a;
  --accent2:   #d4aa6a;
  --dim:       #1e2a3a;
}

body {
  background: var(--bg);
  color: var(--en);
  font-family: 'Noto Sans KR', sans-serif;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  -webkit-text-size-adjust: 100%;
}

/* ══════════════════════════════════════════
   SCREEN 1 – WELCOME
══════════════════════════════════════════ */
#scr-welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 52px;
  animation: fadeUp 0.8s ease both;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

.logo-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.logo-line {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo-dash {
  width: 40px;
  height: 1px;
  background: var(--accent);
  opacity: 0.6;
}

.logo-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.45em;
  color: var(--ts);
  text-transform: uppercase;
}

.logo-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 72px;
  font-weight: 300;
  letter-spacing: 0.12em;
  line-height: 1;
  color: var(--en);
}

.logo-title em {
  font-style: italic;
  color: var(--accent2);
}

.drop-zone {
  position: relative;
  width: min(420px, 88vw);
  min-height: 200px;
  border: 1px solid var(--border2);
  border-radius: 2px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  cursor: pointer;
  background: var(--surface);
  transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
}

.drop-zone::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(184,146,74,0.08) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.drop-zone:hover {
  border-color: var(--accent);
  box-shadow: 0 0 40px rgba(184,146,74,0.08);
}

.drop-zone:hover::before { opacity: 1; }

/* 파일 인풋: 완전히 표시 */
.drop-zone input[type=file] {
  font-size: 16px;
  color: transparent;
  cursor: pointer;
  position: relative;
  z-index: 10;
  touch-action: manipulation;
  display: block;
  width: fit-content;
  margin: 0 auto;
}
.drop-zone input[type=file]::file-selector-button {
  padding: 12px 36px;
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent2);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  border-radius: 2px;
  cursor: pointer;
  touch-action: manipulation;
  display: block;
  margin: 0 auto;
}

.drop-icon {
  width: 48px;
  height: 48px;
  border: 1px solid var(--border2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  font-size: 20px;
  transition: border-color 0.25s;
}

.drop-zone:hover .drop-icon { border-color: var(--accent); }

.drop-text {
  font-size: 14px;
  color: var(--ko);
  letter-spacing: 0.02em;
}

.drop-hint {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--ts);
  letter-spacing: 0.08em;
}

.drop-zone.drag-over {
  border-color: var(--accent2);
  background: rgba(184,146,74,0.06);
}

/* ══════════════════════════════════════════
   SCREEN 2 – PLAYER
══════════════════════════════════════════ */
#scr-player {
  display: none;
  flex-direction: column;
  width: 100vw;
  height: 100vh;
}

/* ── Header ── */
.ph {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 48px;
  border-bottom: 1px solid var(--border);
}

.ph-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 0.25em;
  color: var(--accent);
}

.ph-logo span { color: var(--en); opacity: 0.4; }

.ph-file {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--ts-cur);
  letter-spacing: 0.05em;
  max-width: 340px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Stage ── */
.stage {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* fade masks */
.stage::before,
.stage::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  z-index: 10;
  pointer-events: none;
}
.stage::before {
  top: 0; height: 120px;
  background: linear-gradient(to bottom, var(--bg) 0%, transparent 100%);
}
.stage::after {
  bottom: 0; height: 120px;
  background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
}

.viewport {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
}

@keyframes snapUp {
  from { opacity: 0.3; transform: translateY(12px); }
  to   { opacity: 1;   transform: translateY(0); }
}
@keyframes snapDown {
  from { opacity: 0.3; transform: translateY(-12px); }
  to   { opacity: 1;   transform: translateY(0); }
}

.track {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
}

.track.anim-up   { animation: snapUp   0.28s cubic-bezier(0.4,0,0.2,1); }
.track.anim-down { animation: snapDown 0.28s cubic-bezier(0.4,0,0.2,1); }

/* ── Line Entry ── */
.le {
  flex-shrink: 0;
  padding: 8px 16px 8px 0;
  display: flex;
  align-items: flex-start;
  gap: 0;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.le:last-child { border-bottom: none; }

.le-bar {
  flex-shrink: 0;
  width: 3px;
  height: 100%;
  margin-right: 20px;
  background: transparent;
  transition: background 0.3s;
  align-self: stretch;
  border-radius: 0 2px 2px 0;
}

.le-ts {
  flex-shrink: 0;
  width: 56px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--ts);
  padding-top: 8px;
  letter-spacing: 0.06em;
  transition: color 0.3s;
  text-align: right;
  margin-right: 20px;
}

.le-body {
  flex: 1;
  min-width: 0;
}

.le-en {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 400;
  color: var(--en);
  line-height: 1.35;
  margin-bottom: 5px;
  transition: color 0.3s, font-size 0.3s;
  word-break: break-word;
}

.le-trs {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.le-ko {
  display: flex;
  align-items: baseline;
  gap: 6px;
  font-size: 12px;
  color: var(--ko);
  line-height: 1.5;
  transition: color 0.3s;
  word-break: break-word;
  flex-wrap: wrap;
}

.ko-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--ts);
  flex-shrink: 0;
  transition: color 0.3s;
  display: inline;
}

/* ── Current line state ── */
.le.cur .le-bar    { background: var(--accent); }
.le.cur .le-ts     { color: var(--ts-cur); }
.le.cur .le-en     { color: var(--en-cur); font-size: 26px; }
.le.cur .le-ko     { color: var(--ko-cur); }
.le.cur .ko-tag    { color: var(--accent); }

/* ── Dim non-current lines ── */
.le.dim { opacity: 0.45; }

/* ── Controls ── */
.controls {
  flex-shrink: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 14px 48px 20px;
}

.slider-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}

.t-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--ko);
  min-width: 38px;
  letter-spacing: 0.04em;
}

.t-label.right { text-align: right; }

input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 2px;
  background: var(--border2);
  border-radius: 1px;
  outline: none;
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent2);
  cursor: pointer;
  box-shadow: 0 0 0 3px rgba(184,146,74,0);
  transition: box-shadow 0.2s, transform 0.2s;
}

input[type=range]:hover::-webkit-slider-thumb,
input[type=range]:active::-webkit-slider-thumb {
  box-shadow: 0 0 0 4px rgba(184,146,74,0.18);
  transform: scale(1.15);
}

.btn-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.btn {
  padding: 8px 26px;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--ko);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.04em;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  white-space: nowrap;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.btn:hover { border-color: var(--accent); color: var(--accent2); }

.btn-play {
  border-color: var(--accent);
  color: var(--accent2);
  padding: 8px 44px;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.08em;
  min-width: 130px;
  text-align: center;
}

.btn-play:hover {
  background: rgba(184,146,74,0.08);
}

.btn-done {
  color: var(--ts-cur);
  border-color: var(--border);
}

.btn-done:hover { border-color: #a04040; color: #c05050; }

/* ── Speed Controls ── */
.speed-group {
  display: flex;
  align-items: center;
  gap: 0;
  border: 1px solid var(--border2);
  border-radius: 2px;
  overflow: hidden;
}

.btn-speed {
  padding: 8px 14px;
  background: transparent;
  border: none;
  border-right: 1px solid var(--border2);
  color: var(--ts-cur);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}

.btn-speed:last-child { border-right: none; }
.btn-speed:hover { background: rgba(184,146,74,0.08); color: var(--accent2); }

.btn-speed.active {
  background: rgba(184,146,74,0.15);
  color: var(--accent2);
}
</style>
</head>

<body>

<!-- ──────────── SCREEN 1: WELCOME ──────────── -->
<div id="scr-welcome">

  <div class="logo-block">
    <div class="logo-line">
      <div class="logo-dash"></div>
      <div class="logo-sub">Script Synchronized Reader &nbsp;·&nbsp; v12</div>
      <div class="logo-dash"></div>
    </div>
    <div class="logo-title">Reading <em>Lines</em></div>
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">📄</div>
    <div class="drop-text">엑셀 파일을 선택하세요</div>
    <input type="file" id="fileInput" accept=".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel">
    <div class="drop-hint">.xlsx / .xls</div>
  </div>
  <div id="status-msg" style="
    margin-top:16px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:#c05050;
    text-align:center;
    max-width:320px;
    line-height:1.6;
    display:none;
  "></div>

</div>

<!-- ──────────── SCREEN 2: PLAYER ──────────── -->
<div id="scr-player">

  <header class="ph">
    <div class="ph-logo">R<span>/</span>L</div>
    <div class="ph-file" id="ph-file">—</div>
  </header>

  <div class="stage" id="stage">
    <div class="viewport">
      <div class="track" id="track"></div>
    </div>
  </div>

  <div class="controls">
    <div class="slider-row">
      <span class="t-label" id="t-cur">0:00</span>
      <input type="range" id="slider" min="0" max="100" value="0" step="0.01">
      <span class="t-label right" id="t-total">0:00</span>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-prev">◀&nbsp; 이전</button>
      <button class="btn" id="btn-next">다음&nbsp;▶</button>
      <button class="btn btn-play" id="btn-play">일시정지</button>
      <button class="btn btn-done" id="btn-done">완료</button>
      <div class="speed-group" id="speed-group">
        <button class="btn-speed active" data-speed="1">1×</button>
        <button class="btn-speed" data-speed="1.5">1.5×</button>
        <button class="btn-speed" data-speed="2">2×</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ─────────────────────────────────────────────
   STATE
───────────────────────────────────────────── */
let rows       = [];   // [{time, english, human, machine}]
let totalDur   = 0;
let curTime    = 0;
let playing    = false;
let lastTs     = null;
let raf        = null;
let dragging   = false;
let speed      = 1;

/* ─────────────────────────────────────────────
   RENDER TRACK
───────────────────────────────────────────── */
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function lineHTML(i, isCur) {
  if (i < 0 || i >= rows.length) return '<div class="le"></div>';
  const r = rows[i];
  return `<div class="le${isCur ? ' cur' : ' dim'}">
      <div class="le-bar"></div>
      <div class="le-ts">${fmt(r.time)}</div>
      <div class="le-body">
        <div class="le-en">${esc(r.english)}</div>
        <div class="le-trs">
          <div class="le-ko"><span class="ko-tag">인간&nbsp;</span>${esc(r.human)}</div>
          <div class="le-ko"><span class="ko-tag">기계&nbsp;</span>${esc(r.machine)}</div>
        </div>
      </div>
    </div>`;
}

function buildLines(idx, count) {
  // current 위치: count=4→2번째(idx-2), count=3→1번째(idx-1), count=2→0번째(idx)
  const curPos = Math.max(0, count - 2);
  const start  = idx - curPos;
  let html = '';
  for (let i = 0; i < count; i++) {
    html += lineHTML(start + i, start + i === idx);
  }
  return html;
}

function measureHeight(html, refEl) {
  // 임시 클론으로 실제 콘텐츠 높이 측정 (height:auto)
  const temp = document.createElement('div');
  temp.style.cssText =
    'position:fixed;top:-9999px;left:0;' +
    'width:' + refEl.clientWidth + 'px;' +
    'display:flex;flex-direction:column;visibility:hidden;pointer-events:none;';
  temp.innerHTML = html;
  document.body.appendChild(temp);
  const h = temp.scrollHeight;
  document.body.removeChild(temp);
  return h;
}

function renderVisible(idx, dir) {
  const track    = document.getElementById('track');
  const viewport = track.parentElement;
  const availH   = viewport.clientHeight;

  // 4줄 → 3줄 → 2줄 순으로 시도, 실제 높이가 맞으면 확정
  let finalHtml = buildLines(idx, 2); // 기본값
  for (let count = 4; count >= 2; count--) {
    const html = buildLines(idx, count);
    const h    = measureHeight(html, viewport);
    if (h <= availH || count === 2) {
      finalHtml = html;
      break;
    }
  }

  track.innerHTML = finalHtml;
  track.classList.remove('anim-up', 'anim-down');
  void track.offsetWidth;
  if (dir === 'up')   track.classList.add('anim-up');
  if (dir === 'down') track.classList.add('anim-down');
}

function parseTime(v) {
  if (v === null || v === undefined || v === '') return 0;
  if (typeof v === 'number') {
    if (v > 0 && v < 1) return v * 86400;
    return v;
  }
  const s = String(v).trim();
  const p = s.split(':');
  if (p.length === 3) return +p[0] * 3600 + +p[1] * 60 + parseFloat(p[2]);
  if (p.length === 2) return +p[0] * 60 + parseFloat(p[1]);
  return parseFloat(s) || 0;
}

function fmt(sec) {
  const s = Math.max(0, Math.floor(sec));
  const m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2, '0')}`;
}

/* ─────────────────────────────────────────────
   FILE LOADING
───────────────────────────────────────────── */
document.getElementById('fileInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (f) load(f);
});

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0]; if (f) load(f);
});

function showStatus(msg) {
  const el = document.getElementById('status-msg');
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function load(file) {
  showStatus('읽는 중... ' + file.name);

  // XLSX 라이브러리 확인
  if (typeof XLSX === 'undefined') {
    showStatus('❌ XLSX 라이브러리 로드 실패. 인터넷 연결을 확인하세요.');
    return;
  }

  const reader = new FileReader();
  reader.onerror = () => showStatus('❌ 파일 읽기 실패: ' + (reader.error?.message || '알 수 없는 오류'));
  reader.onload = ev => {
    try {
      showStatus('파싱 중...');
      const wb = XLSX.read(ev.target.result, { type: 'array' });
      if (!wb.SheetNames.length) { showStatus('❌ 시트를 찾을 수 없습니다.'); return; }

      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (raw.length < 2) { showStatus('❌ 데이터가 없습니다. (행 수: ' + raw.length + ')'); return; }

      // 헤더 감지 (헤더행 또는 위치 기반 폴백)
      const hdr = raw[0].map(h => String(h).trim());
      showStatus('헤더: ' + hdr.join(' | '));

      const fi = (kws) => {
        const i = hdr.findIndex(h => kws.some(k => h.includes(k)));
        return i >= 0 ? i : -1;
      };
      const ti = fi(['시간','time','Time'])   >= 0 ? fi(['시간','time','Time'])   : 0;
      const ei = fi(['영어','English','english']) >= 0 ? fi(['영어','English','english']) : 1;
      const hi = fi(['사람','인간','human'])  >= 0 ? fi(['사람','인간','human'])  : 2;
      const mi = fi(['기계','machine','Machine']) >= 0 ? fi(['기계','machine','Machine']) : 3;

      showStatus('컬럼: 시간=' + ti + ' 영어=' + ei + ' 사람=' + hi + ' 기계=' + mi);

      // 첫 행이 헤더인지 데이터인지 판단
      const startRow = (parseTime(raw[0][ti]) === 0 && raw[0][ei]) ? 0 : 1;

      rows = raw.slice(startRow)
        .map(r => ({
          time:    parseTime(r[ti]),
          english: String(r[ei] || '').trim(),
          human:   String(r[hi] || '').trim(),
          machine: String(r[mi] || '').trim(),
        }))
        .filter(r => r.english !== '');

      if (!rows.length) {
        showStatus('❌ 데이터 없음. 헤더: [' + hdr.join('|') + '] 컬럼위치: 시간=' + ti + ' 영어=' + ei + ' 총행수=' + raw.length);
        return;
      }

      rows.sort((a, b) => a.time - b.time);
      totalDur = rows[rows.length - 1].time + 6;
      showStatus('');

      document.getElementById('ph-file').textContent = file.name;
      document.getElementById('t-total').textContent = fmt(totalDur);
      const slider = document.getElementById('slider');
      slider.max = totalDur;
      slider.value = 0;

      initPlayer();
    } catch(e) {
      showStatus('❌ 오류: ' + e.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

/* ─────────────────────────────────────────────
   PLAYER
───────────────────────────────────────────── */
function curIdx() {
  let idx = 0;
  for (let i = 0; i < rows.length; i++) {
    if (rows[i].time <= curTime) idx = i; else break;
  }
  return idx;
}

function initPlayer() {
  curTime = rows[0].time;
  prevCurIdx = -1;
  playing = true;
  lastTs  = performance.now();

  document.getElementById('scr-welcome').style.display = 'none';
  document.getElementById('scr-player').style.display  = 'flex';

  updateBtn();
  if (raf) cancelAnimationFrame(raf);
  loop();
}

function loop() {
  raf = requestAnimationFrame(ts => {
    if (playing && !dragging) {
      const dt = (ts - lastTs) / 1000;
      curTime = Math.min(curTime + dt * speed, totalDur);
      if (curTime >= totalDur) { playing = false; updateBtn(); }
    }
    lastTs = ts;
    render();
    loop();
  });
}

let prevCurIdx = -1;

function render() {
  const idx = curIdx();
  if (idx !== prevCurIdx) {
    const dir = idx > prevCurIdx ? 'up' : 'down';
    renderVisible(idx, prevCurIdx === -1 ? null : dir);
    prevCurIdx = idx;
  }
  if (!dragging) document.getElementById('slider').value = curTime;
  document.getElementById('t-cur').textContent = fmt(curTime);
}

/* ─────────────────────────────────────────────
   CONTROLS
───────────────────────────────────────────── */
document.getElementById('btn-play').addEventListener('click', () => {
  playing = !playing;
  lastTs  = performance.now();
  updateBtn();
});

function updateBtn() {
  document.getElementById('btn-play').textContent = playing ? '일시정지' : '▶  재생';
}

document.getElementById('btn-prev').addEventListener('click', () => {
  const idx  = curIdx();
  const prev = Math.max(0, idx - 1);
  curTime = rows[prev].time;
  lastTs  = performance.now();
  prevCurIdx = -1; // force re-render
});

document.getElementById('btn-next').addEventListener('click', () => {
  const idx  = curIdx();
  const next = Math.min(rows.length - 1, idx + 1);
  curTime = rows[next].time;
  lastTs  = performance.now();
  prevCurIdx = -1; // force re-render
});

document.getElementById('btn-done').addEventListener('click', () => {
  playing = false;
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  speed = 1;
  document.querySelectorAll('.btn-speed').forEach((b,i) => b.classList.toggle('active', i===0));
  document.getElementById('scr-player').style.display  = 'none';
  document.getElementById('scr-welcome').style.display = 'flex';
  document.getElementById('fileInput').value = '';
  rows = [];
  prevCurIdx = -1;
});

// Speed buttons
document.getElementById('speed-group').addEventListener('click', e => {
  const btn = e.target.closest('.btn-speed');
  if (!btn) return;
  speed = parseFloat(btn.dataset.speed);
  document.querySelectorAll('.btn-speed').forEach(b => b.classList.toggle('active', b === btn));
  lastTs = performance.now();
});

// Slider
const sliderEl = document.getElementById('slider');
sliderEl.addEventListener('mousedown',  () => { dragging = true; });
sliderEl.addEventListener('touchstart', () => { dragging = true; }, { passive: true });
sliderEl.addEventListener('input', () => {
  curTime = parseFloat(sliderEl.value);
  document.getElementById('t-cur').textContent = fmt(curTime);
  render();
});
const endDrag = () => { dragging = false; lastTs = performance.now(); };
sliderEl.addEventListener('mouseup',  endDrag);
sliderEl.addEventListener('touchend', endDrag);

// ─────────────────────────────────────────────
// PWA: Service Worker 등록
// ─────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
